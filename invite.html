<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Prajwal & Shiwangi</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b89a3d;
            --deep-lavender: #7b5da3;
            --light-lavender: #f3f0f7;
            --text-dark: #4a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            background-color: var(--light-lavender);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-dark);
            overflow: hidden;
        }

        .wrapper { display: flex; width: 100%; height: 100vh; }

        .photo-column {
            width: 50%;
            height: 100%;
            background: url('Love_9.JPG');
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 2;
        }

        .content-column {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            background-color: var(--light-lavender);
            background-image: url("https://www.transparenttextures.com/patterns/cream-pixels.png"); 
            position: relative;
        }

        .invite-card {
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header-msg {
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.7rem;
            color: var(--deep-lavender);
            margin-bottom: 10px;
        }

        .names {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: var(--deep-lavender);
            margin: 5px 0;
        }

        /* Countdown Style */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            color: var(--gold);
            font-weight: 600;
        }
        .count-item { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .count-item span { display: block; font-size: 1.4rem; }

        .divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 20px auto;
            opacity: 0.5;
        }

        .details-box { font-size: 1rem; line-height: 1.6; }
        .details-box b {
            color: var(--gold);
            display: block;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .venue-link {
            text-decoration: none;
            color: var(--deep-lavender);
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }
        .venue-link:hover { border-bottom: 1px solid var(--deep-lavender); }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
            align-items: center;
        }

        .btn {
            padding: 14px 25px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            width: 100%;
            max-width: 280px;
            transition: 0.3s;
            text-align: center;
        }

        .btn-rsvp { background-color: var(--deep-lavender); color: white; }
        .btn-calendar { background-color: white; border: 1px solid var(--deep-lavender); color: var(--deep-lavender); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        @media (max-width: 850px) {
            .wrapper { flex-direction: column; overflow-y: auto; height: auto; }
            .photo-column { width: 100%; height: 45vh; }
            .content-column { width: 100%; height: auto; padding: 40px 20px; }
            .names { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="photo-column"></div>

        <div class="content-column">
            <div class="invite-card">
                <div class="header-msg">Kindly join us for the wedding of</div>
                
                <h1 class="names">Prajwal & Shiwangi</h1>

                <div class="countdown" id="timer">
                    <div class="count-item"><span id="days">00</span>Days</div>
                    <div class="count-item"><span id="hours">00</span>Hrs</div>
                    <div class="count-item"><span id="mins">00</span>Min</div>
                </div>
                
                <div class="divider"></div>
                
                <div class="details-box">
                    FRIDAY
                    <b>JUNE 19TH, 2026</b>
                    
                    <a href="https://maps.app.goo.gl/hLeH5fEasrkPQTXy5" target="_blank" class="venue-link">
                        📍 City Club, Lucknow
                    </a>
                    
                    <br>18:00 HRS ONWARDS
                </div>

                <div class="btn-group">
                    <a href="https://forms.gle/6qSkBotyLa319D5D9" target="_blank" class="btn btn-rsvp">
                        ✨ THE CONFIRMATION PORTAL
                    </a>

                    <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=Wedding:+Prajwal+%26+Shiwangi&dates=20260619T123000Z/20260619T183000Z&details=Wedding+Celebration+at+City+Club,+Lucknow&location=City+Club,+Lucknow" target="_blank" class="btn btn-calendar">
                        📅 SAVE TO CALENDAR
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Countdown Logic
        const targetDate = new Date("June 19, 2026 18:00:00").getTime();
        
        setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            
            document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        }, 1000);
    </script>
</body>
</html>
