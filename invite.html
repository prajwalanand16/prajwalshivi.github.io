<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Prajwal & Shiwangi</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --soft-gold: rgba(212, 175, 55, 0.4);
            --bg-overlay: rgba(0, 0, 0, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            background-image: 
                linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                url('Love_1.JPG');
            background-size: cover;
            background-position: center;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 2;
            animation: cardEntrance 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            perspective: 1000px;
        }

        .invite-card {
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(25px);
            padding: 60px 45px;
            border-radius: 4px; /* Stronger, geometric shape */
            border: 1px solid var(--soft-gold);
            max-width: 420px;
            width: 85%;
            box-shadow: 
                0 0 100px rgba(0,0,0,0.8),
                0 0 20px rgba(212, 175, 55, 0.1) inset;
            position: relative;
            overflow: hidden;
        }

        /* Geometric corner accents */
        .invite-card::before, .invite-card::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-style: solid;
            border-color: var(--gold);
            opacity: 0.6;
        }

        .invite-card::before { top: 15px; left: 15px; border-width: 1px 0 0 1px; }
        .invite-card::after { bottom: 15px; right: 15px; border-width: 0 1px 1px 0; }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.9) rotateX(10deg); }
            to { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
        }

        .script-font {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: var(--gold);
            margin: 15px 0 35px 0;
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        h2 {
            font-weight: 200;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--soft-gold), transparent);
            margin: 0 auto;
        }

        .details {
            margin: 40px 0;
            font-size: 1.05rem;
            line-height: 2.3;
            font-weight: 300;
            color: rgba(255,255,255,0.9);
        }

        .details b {
            color: var(--gold);
            display: block;
            font-size: 1.6rem;
            letter-spacing: 3px;
            font-weight: 600;
            text-transform: uppercase;
            margin: 5px 0 10px 0;
        }

        .venue {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .venue span { color: var(--gold); font-size: 1.2rem; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 25px;
        }

        .btn {
            padding: 16px 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* The Confirmation Portal (RSVP) Button */
        .btn-rsvp {
            background-color: var(--gold);
            color: #000;
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
        }

        .btn-calendar {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            letter-spacing: 3px; /* Subtle growth on hover */
        }

        /* Enhanced Floating Particles (Gold Dust) */
        .deco-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .deco-point {
            position: absolute;
            background-color: var(--gold);
            border-radius: 50%;
            animation: dustFloat 12s infinite linear;
            filter: blur(1px);
        }

        @keyframes dustFloat {
            0% { transform: translateY(105vh) scale(0.8); opacity: 0; }
            10% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @media (max-width: 480px) {
            .script-font { font-size: 3.2rem; }
            .invite-card { padding: 45px 30px; }
            .details b { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="deco-wrapper" id="dust-field"></div>

    <div class="container">
        <div class="invite-card">
            <h2>Please Save the Date for the Wedding of</h2>
            <div class="divider"></div>
            <h1 class="script-font">Prajwal & Shiwangi</h1>
            
            <div class="details">
                Friday
                <b>June 19th, 2026</b>
                <div class="divider"></div>
                <div class="venue">
                    <span>📍</span>City Club, Lucknow
                </div>
                18:00 HRS ONWARDS
            </div>

            <div class="btn-group">
                <a href="https://forms.gle/6qSkBotyLa319D5D9" target="_blank" class="btn btn-rsvp">
                    ✨ THE CONFIRMATION PORTAL (RSVP)
                </a>

                <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Wedding+of+Prajwal+and+Shiwangi&dates=20260619T123000Z/20260619T183000Z&details=Celebrating+the+wedding+of+Prajwal+and+Shiwangi+at+City+Club+Lucknow&location=City+Club,+Lucknow" target="_blank" class="btn btn-calendar">
                    📅 ADD TO CALENDAR
                </a>
            </div>
        </div>
    </div>

    <script>
        // Parallax particle effect
        document.addEventListener("mousemove", parallaxEffect);
        const container = document.querySelector(".container");

        function parallaxEffect(e) {
            const amount = 20; // How many pixels the card moves
            const x = (window.innerWidth / 2 - e.pageX) / amount;
            const y = (window.innerHeight / 2 - e.pageY) / amount;
            container.style.transform = `translateX(${-x}px) translateY(${-y}px)`;
        }

        // Particle generator
        const dustField = document.getElementById('dust-field');
        function createDustParticle() {
            const particle = document.createElement('div');
            particle.classList.add('deco-point');
            
            const size = (Math.random() * 4 + 1); // Varied sizes for depth
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
            
            dustField.appendChild(particle);
            setTimeout(() => particle.remove(), 12000);
        }
        setInterval(createDustParticle, 250); // Faster interval for denser dust
    </script>
</body>
</html>
