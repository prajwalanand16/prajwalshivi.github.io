<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Prajwal & Shiwangi</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@200;300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --soft-gold: rgba(212, 175, 55, 0.5);
            --lavender: #967bb6; /* Deep Lavender */
            --soft-lavender: rgba(150, 123, 182, 0.2);
            --bg-dark: #0a0a0c; /* Near Black for contrast */
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            background-color: var(--bg-dark);
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Full Height Split Layout */
        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh;
            align-items: center;
        }

        /* Photo Column (Left) */
        .photo-column {
            width: 50%;
            height: 100%;
            background: 
                linear-gradient(rgba(10, 10, 12, 0.2), rgba(10, 10, 12, 0.2)),
                url('Love_9.JPG');
            background-size: cover;
            background-position: center;
            position: relative;
            animation: imageFadeIn 2s ease-out;
        }

        /* Subtle left gradient overlay to blend into the dark bg */
        .photo-column::after {
            content: '';
            position: absolute;
            top: 0; right: 0; width: 30%; height: 100%;
            background: linear-gradient(to left, var(--bg-dark), transparent);
        }

        /* Content Column (Right) */
        .content-column {
            width: 50%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 80px;
            box-sizing: border-box;
            background: 
                radial-gradient(circle at center, rgba(150, 123, 182, 0.05), transparent 70%),
                var(--bg-dark);
            position: relative;
            overflow: hidden;
            animation: contentEntrance 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes imageFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes contentEntrance { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        .invite-card {
            text-align: center;
            max-width: 500px;
            z-index: 2;
        }

        .header-msg {
            font-weight: 200;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }

        .names {
            font-family: 'Playfair Display', serif; /* Elegant, traditional luxe */
            font-size: 5rem;
            color: white;
            margin: 10px 0;
            line-height: 1;
        }

        .names span {
            color: var(--gold);
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            display: block;
            margin: 10px 0;
        }

        .divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--soft-gold), transparent);
            margin: 40px auto;
        }

        .details-box {
            font-size: 1.1rem;
            line-height: 2.2;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
        }

        .details-box b {
            color: var(--gold);
            display: block;
            font-size: 2rem;
            letter-spacing: 4px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Montserrat', sans-serif;
            margin: 10px 0;
        }

        .venue {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.2rem;
            margin: 20px 0;
            color: rgba(255,255,255,1);
        }

        .venue span { color: var(--lavender); font-size: 1.3rem; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 50px;
            align-items: center;
        }

        .btn {
            padding: 18px 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.5s ease;
            cursor: pointer;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 350px;
        }

        /* Lavender-tinted RSVP Button */
        .btn-rsvp {
            background-color: var(--lavender);
            color: #fff;
            border: 1px solid var(--lavender);
            box-shadow: 0 10px 30px rgba(150, 123, 182, 0.2);
        }

        .btn-calendar {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            letter-spacing: 4px; /* Growth on hover */
        }

        .btn-rsvp:hover {
            background-color: #7b5da3; /* Slightly darker lavender on hover */
        }

        /* Floating Lavender Particles */
        .deco-point {
            position: absolute;
            background-color: var(--lavender);
            border-radius: 50%;
            animation: dustFloat 12s infinite linear;
            filter: blur(2px);
            opacity: 0.4;
        }

        @keyframes dustFloat {
            0% { transform: translateY(105vh); opacity: 0; }
            10% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* Responsiveness for Mobile */
        @media (max-width: 992px) {
            .wrapper { flex-direction: column; height: auto; overflow-y: auto; }
            .photo-column { width: 100%; height: 60vh; border-right: none; }
            .content-column { width: 100%; height: auto; padding: 60px 40px; }
            .names { font-size: 3.5rem; }
            .names span { font-size: 3rem; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="photo-column"></div>

        <div class="content-column">
            <div id="dust-field" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>
            
            <div class="invite-card">
                <div class="header-msg">You are cordially invited to celebrate the union of</div>
                
                <h1 class="names">
                    Prajwal
                    <span>&</span>
                    Shiwangi
                </h1>
                
                <div class="divider"></div>
                
                <div class="details-box">
                    FRIDAY
                    <b>JUNE 19TH, 2026</b>
                    <div class="venue">
                        <span>💜</span>CITY CLUB, LUCKNOW
                    </div>
                    18:00 HRS ONWARDS
                </div>

                <div class="divider"></div>

                <div class="btn-group">
                    <a href="https://forms.gle/6qSkBotyLa319D5D9" target="_blank" class="btn btn-rsvp">
                        ✨ THE CONFIRMATION PORTAL (RSVP)
                    </a>

                    <a href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=Wedding+of+Prajwal+and+Shiwangi&dates=20260619T123000Z/20260619T183000Z&details=Celebrating+the+wedding+of+Prajwal+and+Shiwangi+at+City+Club+Lucknow&location=City+Club,+Lucknow" target="_blank" class="btn btn-calendar">
                        📅 ADD TO CALENDAR
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lavender particle generator
        const dustField = document.getElementById('dust-field');
        function createDustParticle() {
            const particle = document.createElement('div');
            particle.classList.add('deco-point');
            
            const size = (Math.random() * 5 + 1); // Depth variance
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            particle.style.left = Math.random() * 100 + '%'; // Relative to the content column
            particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
            
            dustField.appendChild(particle);
            setTimeout(() => particle.remove(), 12000);
        }
        // Slower particle rate for sophistication
        setInterval(createDustParticle, 600); 
    </script>
</body>
</html>
